version: '3.8'

# ============================================================
# This shares the same Paimon warehouse volume as repo 1.
# In production (like your company), both apps read/write
# to the same S3 warehouse. Locally, we use a shared Docker volume.
#
# NOTE: Start repo 1's docker-compose FIRST so the warehouse
# and Postgres are available.
# ============================================================

services:
  # Reuse the same Flink cluster from repo 1, OR
  # uncomment below to run a separate cluster for transforms
  #
  # jobmanager:
  #   image: flink:1.20.1-java11
  #   container_name: flink-transforms-jobmanager
  #   ports:
  #     - "8082:8081"
  #   command: jobmanager
  #   environment:
  #     - |
  #       FLINK_PROPERTIES=
  #       jobmanager.rpc.address: jobmanager
  #       state.backend: rocksdb
  #       state.checkpoints.dir: file:///opt/flink/checkpoints
  #       execution.checkpointing.interval: 60s
  #   volumes:
  #     - flink-cdc-ingestion_paimon-warehouse:/opt/paimon/warehouse
  #
  # taskmanager:
  #   image: flink:1.20.1-java11
  #   container_name: flink-transforms-taskmanager
  #   depends_on:
  #     - jobmanager
  #   command: taskmanager
  #   environment:
  #     - |
  #       FLINK_PROPERTIES=
  #       jobmanager.rpc.address: jobmanager
  #       taskmanager.numberOfTaskSlots: 4
  #       state.backend: rocksdb
  #       state.checkpoints.dir: file:///opt/flink/checkpoints
  #       execution.checkpointing.interval: 60s
  #   volumes:
  #     - flink-cdc-ingestion_paimon-warehouse:/opt/paimon/warehouse

  placeholder:
    image: busybox
    command: echo "See comments above - use repo 1 Flink cluster or uncomment services"

# To share the Paimon warehouse from repo 1:

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-cdc
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"           # Required for CDC - enables logical decoding
      - "-c"
      - "max_replication_slots=4"     # Number of replication slots available
      - "-c"
      - "max_wal_senders=4"           # Number of concurrent WAL sender processes
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  pgdata:
